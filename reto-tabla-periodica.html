<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reto: Tabla Periódica Completa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b1220; --card:#16223a; --line:#243252; --text:#eef2ff; --dim:#8ea0c9;
    --accent:#5eead4; --accent2:#fbbf24; --wrong:#fb7185; --right:#4ade80;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;min-height:100%;}
  body{
    background:
      radial-gradient(circle at 15% 8%, rgba(94,234,212,.10), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(251,191,36,.08), transparent 45%),
      var(--bg);
    color:var(--text); font-family:'Space Grotesk',sans-serif;
    display:flex; justify-content:center; padding:26px 16px 60px;
  }
  #app{ width:100%; max-width:480px; }
  .eyebrow{ font-family:'JetBrains Mono',monospace; font-weight:800; font-size:11px; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; }
  h1{ font-size:24px; margin:8px 0 4px; font-weight:700; }
  .subtitle{ color:var(--dim); font-size:13.5px; line-height:1.5; }
  header{ text-align:center; margin-bottom:20px; }

  .screen{ display:none; }
  .screen.active{ display:block; }

  /* ---- menu ---- */
  .seg-card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:16px 18px; margin-bottom:12px; cursor:pointer; display:flex; align-items:center; gap:14px;
    transition:border-color .15s, transform .1s;
  }
  .seg-card:hover{ border-color:var(--accent); transform:translateY(-1px); }
  .seg-num{
    width:46px; height:46px; border-radius:12px; background:rgba(94,234,212,.12); color:var(--accent);
    display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-weight:800; font-size:14px; flex-shrink:0;
  }
  .seg-title{ font-weight:700; font-size:15.5px; }
  .seg-sub{ color:var(--dim); font-size:12.5px; margin-top:2px; }
  .seg-arrow{ margin-left:auto; color:var(--dim); font-size:20px; }

  #explore-btn{
    width:100%; margin-top:6px; padding:14px; border:1.5px dashed var(--line); border-radius:14px;
    background:transparent; color:var(--dim); font-family:'Space Grotesk',sans-serif; font-weight:700;
    font-size:14.5px; cursor:pointer;
  }
  #explore-btn:hover{ border-color:var(--accent2); color:var(--accent2); }

  /* ---- quiz ---- */
  #progress-wrap{ height:8px; background:var(--line); border-radius:99px; overflow:hidden; margin:18px 0 22px; }
  #progress-fill{ height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .35s ease; }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:20px; padding:24px 20px; box-shadow:0 20px 40px rgba(0,0,0,.35); }
  .back-link{ display:inline-block; color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:12px; margin-bottom:14px; cursor:pointer; }
  .back-link:hover{ color:var(--accent); }

  #q-meta{ display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--dim); margin-bottom:14px; }
  #q-meta .tag{ background:rgba(94,234,212,.12); color:var(--accent); padding:3px 10px; border-radius:99px; font-weight:800; }
  #q-text{ font-size:20px; font-weight:700; line-height:1.35; margin-bottom:20px; }
  #q-text .hl{ font-family:'JetBrains Mono',monospace; color:var(--accent2); }

  .opt{
    width:100%; text-align:left; background:#0f1a2e; border:1.5px solid var(--line); color:var(--text);
    font-family:'Space Grotesk',sans-serif; font-size:15.5px; font-weight:600; padding:13px 15px;
    border-radius:12px; margin-bottom:9px; cursor:pointer; transition:border-color .15s, transform .1s;
  }
  .opt:hover:not(:disabled){ border-color:var(--accent); transform:translateY(-1px); }
  .opt:disabled{ cursor:default; }
  .opt.correct{ background:rgba(74,222,128,.14); border-color:var(--right); color:var(--right); }
  .opt.wrong{ background:rgba(251,113,133,.14); border-color:var(--wrong); color:var(--wrong); }
  .opt.dim{ opacity:.4; }

  #feedback{ margin-top:14px; font-size:14px; font-weight:600; min-height:20px; }
  #feedback.ok{ color:var(--right); } #feedback.bad{ color:var(--wrong); }

  #fact-box{
    display:none; margin-top:14px; background:#0f1a2e; border-left:3px solid var(--accent2);
    border-radius:0 10px 10px 0; padding:12px 14px; font-size:13.5px; color:var(--dim); line-height:1.5;
  }
  #fact-box b{ color:var(--text); }

  #next-btn{
    display:none; margin-top:16px; width:100%; padding:13px; border:none; border-radius:12px;
    background:var(--accent); color:#062018; font-weight:700; font-size:15.5px; cursor:pointer;
  }

  /* ---- result ---- */
  #result .score{ font-family:'JetBrains Mono',monospace; font-weight:800; font-size:52px; color:var(--accent2); margin:8px 0; text-align:center; }
  #result .msg{ font-size:15px; color:var(--text); margin-bottom:20px; line-height:1.5; text-align:center; }
  .result-actions{ display:flex; flex-direction:column; gap:10px; }
  .btn-primary{ width:100%; padding:13px; border:none; border-radius:12px; background:var(--accent2); color:#241800; font-weight:700; font-size:15px; cursor:pointer; }
  .btn-secondary{ width:100%; padding:13px; border:1.5px solid var(--line); border-radius:12px; background:transparent; color:var(--text); font-weight:700; font-size:15px; cursor:pointer; }

  /* ---- explore ---- */
  .explore-item{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px 16px; margin-bottom:10px; }
  .explore-head{ display:flex; align-items:baseline; gap:10px; margin-bottom:5px; }
  .explore-num{ font-family:'JetBrains Mono',monospace; color:var(--dim); font-size:12px; }
  .explore-symbol{ font-family:'JetBrains Mono',monospace; color:var(--accent); font-weight:800; font-size:16px; }
  .explore-name{ font-weight:700; font-size:15px; }
  .explore-fact{ color:var(--dim); font-size:13px; line-height:1.5; }

  .foot{ text-align:center; color:var(--dim); font-size:12px; margin-top:22px; font-family:'JetBrains Mono',monospace; }
</style>
</head>
<body>
<div id="app">

  <div class="screen active" id="screen-menu">
    <header>
      <div class="eyebrow">Laboratorio de Química</div>
      <h1>⚗️ Reto: Tabla Periódica</h1>
      <div class="subtitle">Los 118 elementos, en 6 tandas. Elige por dónde partir.</div>

    </div>

    </div>

</div>

function makeSegments(){
  const segs = [];
  let start = 0;
  while(start < ELEMENTS.length){
    const chunk = ELEMENTS.slice(start, start+21);
    segs.push(chunk);
    start += 21;
  }
  return segs;
}
const SEGMENTS = makeSegments();

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function buildQuestions(segmentElements){
  const pool = shuffle(segmentElements);
  return pool.map(el => {
    const [num, name, symbol, fact] = el;
    const askSymbol = Math.random() < 0.5;
    let correct, prompt, wrongPool;
    if(askSymbol){
      correct = symbol;
      prompt = `¿Cuál es el <span class="hl">símbolo</span> de <b>${name}</b>?`;
      wrongPool = ELEMENTS.filter(e => e[2] !== symbol).map(e => e[2]);
    } else {
      correct = name;
      prompt = `¿Qué elemento tiene el símbolo <span class="hl">${symbol}</span>?`;
      wrongPool = ELEMENTS.filter(e => e[1] !== name).map(e => e[1]);
    }
    const wrongs = shuffle(wrongPool).slice(0,3);
    const options = shuffle([correct, ...wrongs]);
    return { prompt, correct, options, num, name, symbol, fact };
  });
}

// ---- state ----
let currentSegIdx = 0;
let questions = [];
let idx = 0;
let score = 0;
let answered = false;

// ---- elements ----
const screens = {
  menu: document.getElementById('screen-menu'),
  quiz: document.getElementById('screen-quiz'),
  result: document.getElementById('screen-result'),
  explore: document.getElementById('screen-explore'),
};
function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
  window.scrollTo(0,0);
}

// ---- menu ----
const segList = document.getElementById('seg-list');
SEGMENTS.forEach((seg, i) => {
  const first = seg[0][0], last = seg[seg.length-1][0];
  const card = document.createElement('div');
  card.className = 'seg-card';
  card.innerHTML = `
    <div class="seg-num">${i+1}</div>
    <div>
      <div class="seg-title">Segmento ${i+1}</div>
      <div class="seg-sub">Elementos ${first} al ${last} · ${seg.length} preguntas</div>
    </div>
    <div class="seg-arrow">→</div>`;
  card.addEventListener('click', () => startSegment(i));
  segList.appendChild(card);
});

document.getElementById('explore-btn').addEventListener('click', () => {
  renderExplore();
  showScreen('explore');
});
document.getElementById('explore-back').addEventListener('click', () => showScreen('menu'));
document.getElementById('quiz-back').addEventListener('click', () => showScreen('menu'));
document.getElementById('menu-btn').addEventListener('click', () => showScreen('menu'));

function startSegment(i){
  currentSegIdx = i;
  questions = buildQuestions(SEGMENTS[i]);
  idx = 0; score = 0;
  showScreen('quiz');
  renderQuestion();
}

// ---- quiz ----
const qCount = document.getElementById('q-count');
const qScore = document.getElementById('q-score');
const qText = document.getElementById('q-text');
const optionsEl = document.getElementById('options');
const feedback = document.getElementById('feedback');
const factBox = document.getElementById('fact-box');
const nextBtn = document.getElementById('next-btn');
const progressFill = document.getElementById('progress-fill');

function renderQuestion(){
  answered = false;
  const q = questions[idx];
  qCount.textContent = `Segmento ${currentSegIdx+1} · Pregunta ${idx+1}/${questions.length}`;
  qScore.textContent = `${score} pts`;
  qText.innerHTML = q.prompt;
  progressFill.style.width = (idx/questions.length*100) + '%';
  feedback.textContent = ''; feedback.className = '';
  factBox.style.display = 'none'; factBox.innerHTML = '';
  nextBtn.style.display = 'none';

  optionsEl.innerHTML = '';
  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => selectAnswer(btn, opt, q));
    optionsEl.appendChild(btn);
  });
}

function selectAnswer(btn, opt, q){
  if(answered) return;
  answered = true;
  optionsEl.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    if(b.textContent === q.correct) b.classList.add('correct');
    else if(b === btn) b.classList.add('wrong');
    else b.classList.add('dim');
  });

  if(opt === q.correct){ score++; feedback.textContent = '¡Correcto! 🎉'; feedback.className = 'ok'; }
  else { feedback.textContent = `Ups, era ${q.correct}.`; feedback.className = 'bad'; }

  factBox.style.display = 'block';
  factBox.innerHTML = `<b>${q.num}. ${q.name} (${q.symbol})</b><br>${q.fact}`;
  qScore.textContent = `${score} pts`;
  nextBtn.style.display = 'block';
}

nextBtn.addEventListener('click', () => {
  idx++;
  if(idx < questions.length) renderQuestion();
  else showResult();
});

// ---- result ----
const scoreNum = document.getElementById('score-num');
const scoreMsg = document.getElementById('score-msg');
const repeatBtn = document.getElementById('repeat-btn');
const nextSegBtn = document.getElementById('next-seg-btn');

function showResult(){
  showScreen('result');
  scoreNum.textContent = `${score}/${questions.length}`;
  const pct = score/questions.length;
  let msg;
  if(pct === 1) msg = "¡Perfecto! Te sabes este segmento al derecho y al revés. 🏆";
  else if(pct >= 0.8) msg = "¡Muy bien! Te lo sabes casi todo. 💪";
  else if(pct >= 0.6) msg = "Vas bien, repasa un par y la próxima lo rompes todo. 👍";
  else msg = "Buen intento — repasa la guía y vuelve a jugar, vas a mejorar rápido. 🔬";
  scoreMsg.textContent = msg;

  if(currentSegIdx < SEGMENTS.length - 1){
    nextSegBtn.style.display = 'block';
  } else {
    nextSegBtn.style.display = 'none';
  }
}

repeatBtn.addEventListener('click', () => startSegment(currentSegIdx));
nextSegBtn.addEventListener('click', () => startSegment(currentSegIdx + 1));

// ---- explore ----
function renderExplore(){
  const list = document.getElementById('explore-list');
  list.innerHTML = '';
  ELEMENTS.forEach(([num,name,symbol,fact]) => {
    const item = document.createElement('div');
    item.className = 'explore-item';
    item.innerHTML = `
      <div class="explore-head">
        <span class="explore-num">#${num}</span>
        <span class="explore-symbol">${symbol}</span>
        <span class="explore-name">${name}</span>
      </div>
      <div class="explore-fact">${fact}</div>`;
    list.appendChild(item);
  });
}
</script>
